<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Читатели — АСУБ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">АСУБ — Библиотека</a>
            <div class="navbar-nav">
                <a class="nav-link" href="/books">Книги</a>
                <a class="nav-link" href="/readers">Читатели</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center">
            <h1>Читатели</h1>
            <a href="/readers/add" class="btn btn-success">Добавить читателя</a>
        </div>
        
        <table class="table table-striped mt-3">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>ФИО</th>
                    <th>Паспорт</th>
                    <th>Телефон</th>
                    <th>Email</th>
                    <th>Адрес</th>
                </tr>
            </thead>
            <tbody>
                {% for reader in readers %}
                <tr>
                    <td>{{ reader.reader_id }}</td>
                    <td>{{ reader.full_name }}</td>
                    <td>{{ reader.passport_num }}</td>
                    <td>{{ reader.phone }}</td>
                    <td>{{ reader.email }}</td>
                    <td>{{ reader.address }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

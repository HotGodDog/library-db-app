<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Выдать книгу — АСУБ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">АСУБ — Библиотека</a>
            <div class="navbar-nav">
                <a class="nav-link" href="/books">Книги</a>
                <a class="nav-link" href="/readers">Читатели</a>
                <a class="nav-link" href="/loans">Выдачи</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h1>Выдать книгу</h1>
        
        <form method="POST" class="mt-3">
            <div class="mb-3">
                <label class="form-label">Книга</label>
                <select name="book_id" class="form-select" required>
                    {% for book in books %}
                    <option value="{{ book['book_id'] }}">
                        {{ book['title'] }} (доступно: {{ book['available'] }})
                    </option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Читатель</label>
                <select name="reader_id" class="form-select" required>
                    {% for reader in readers %}
                    <option value="{{ reader['reader_id'] }}">
                        {{ reader['last_name'] }} {{ reader['first_name'] }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Сотрудник</label>
                <select name="employee_id" class="form-select" required>
                    {% for emp in employees %}
                    <option value="{{ emp['employee_id'] }}">
                        {{ emp['last_name'] }} {{ emp['first_name'] }} ({{ emp['position'] }})
                    </option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Срок возврата</label>
                <input type="date" name="due_date" class="form-control" required>
            </div>
            
            <button type="submit" class="btn btn-primary">Выдать</button>
            <a href="/loans" class="btn btn-secondary">Отмена</a>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

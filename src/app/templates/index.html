<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АСУБ — Библиотека</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">АСУБ — Библиотека</a>
        </div>
    </nav>

    <div class="container mt-4">
        <h1>Статистика</h1>
        
        <div class="row mt-4">
            <div class="col-md-3 mb-3">
                <div class="card text-center">
                    <div class="card-body">
                        <h2 class="card-title">{{ stats.total_books }}</h2>
                        <p class="card-text">Книг</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3 mb-3">
                <div class="card text-center">
                    <div class="card-body">
                        <h2 class="card-title">{{ stats.total_readers }}</h2>
                        <p class="card-text">Читателей</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3 mb-3">
                <div class="card text-center">
                    <div class="card-body">
                        <h2 class="card-title">{{ stats.active_loans }}</h2>
                        <p class="card-text">На руках</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3 mb-3">
                <div class="card text-center">
                    <div class="card-body">
                        <h2 class="card-title">{{ stats.overdue_loans }}</h2>
                        <p class="card-text">Просрочено</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-4">
            <a href="/books" class="btn btn-primary">Книги</a>
            <a href="/readers" class="btn btn-primary">Читатели</a>
            <a href="/loans" class="btn btn-primary">Выдачи</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

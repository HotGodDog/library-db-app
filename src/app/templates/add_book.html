<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добавить книгу — АСУБ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">АСУБ — Библиотека</a>
            <div class="navbar-nav">
                <a class="nav-link" href="/books">Книги</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h1>Добавить книгу</h1>
        
        <form method="POST" class="mt-3">
            <div class="mb-3">
                <label class="form-label">Название</label>
                <input type="text" name="title" class="form-control" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Автор</label>
                <select name="author_id" class="form-select" required>
                    {% for author in authors %}
                    <option value="{{ author['author_id'] }}">{{ author['last_name'] }} {{ author['first_name'] }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Жанр</label>
                <select name="category_id" class="form-select" required>
                    {% for cat in categories %}
                    <option value="{{ cat['category_id'] }}">{{ cat['name'] }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Издательство</label>
                <select name="publisher_id" class="form-select" required>
                    {% for pub in publishers %}
                    <option value="{{ pub['publisher_id'] }}">{{ pub['name'] }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Год издания</label>
                    <input type="number" name="year_published" class="form-control">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Страниц</label>
                    <input type="number" name="pages" class="form-control">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Количество экземпляров</label>
                    <input type="number" name="total_copies" class="form-control" value="1" required>
                </div>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Описание</label>
                <textarea name="description" class="form-control" rows="3"></textarea>
            </div>
            
            <button type="submit" class="btn btn-primary">Сохранить</button>
            <a href="/books" class="btn btn-secondary">Отмена</a>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

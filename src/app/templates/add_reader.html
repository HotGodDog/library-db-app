<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добавить читателя — АСУБ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">АСУБ — Библиотека</a>
            <div class="navbar-nav">
                <a class="nav-link" href="/books">Книги</a>
                <a class="nav-link" href="/readers">Читатели</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h1>Добавить читателя</h1>
        
        <form method="POST" class="mt-3">
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Фамилия</label>
                    <input type="text" name="last_name" class="form-control" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Имя</label>
                    <input type="text" name="first_name" class="form-control" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Отчество</label>
                    <input type="text" name="middle_name" class="form-control" required>
                </div>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Паспорт</label>
                <input type="text" name="passport_num" class="form-control" required>
            </div>
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Телефон</label>
                    <input type="text" name="phone" class="form-control" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Адрес</label>
                <input type="text" name="address" class="form-control" required>
            </div>
            
            <button type="submit" class="btn btn-primary">Сохранить</button>
            <a href="/readers" class="btn btn-secondary">Отмена</a>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
